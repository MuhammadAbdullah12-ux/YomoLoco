version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: repomind-postgres
    restart: always
    environment:
      POSTGRES_USER: repomind
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: repomind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: repomind-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  postgres_data:
  qdrant_storage:
